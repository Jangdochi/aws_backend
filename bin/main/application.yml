server:
  port: 8080

spring:
  application:
    name: aws-lab-backend
datasource:
  url: jdbc:mysql://database-1-instance-1.cwbma4kqa0gt.us-east-1.rds.amazonaws.com:3306/<DATABASE-NAME>?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
  username: ${DB_USERNAME:admin}
  password: ${DB_PASSWORD:admin}
  driver-class-name: com.mysql.cj.jdbc.Driver
jpa:
  hibernate:
    ddl-auto: update
  show-sql: true
  properties:
    hibernate:
      format_sql: true
