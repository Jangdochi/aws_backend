server:
  port: 8080

spring:
  application:
    name: aws-lab-backend
datasource:
  url: jdbc:mysql://<RDS-ENDPORINT>:3306/<DATABASE-NAME>?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
  username: ${DB_USERNAME}
  password: ${DB_PASSWORD}
  driver-class-name: com.mysql.cj.jdbc.Driver
jpa:
  hibernate:
    ddl-auto: update
  show-sql: true
  properties:
    hibernate:
      format_sql: true
